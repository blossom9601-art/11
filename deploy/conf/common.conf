#
# /etc/blossom/lumina/common.conf
# Blossom Lumina — 공통 설정
#
# 이 파일은 모든 Lumina 컴포넌트(Agent, AP, WEB)가 참조하는 공통 기본값이다.
# RPM 설치 시 자동 생성되며, config(noreplace)로 업그레이드 시 보존된다.
#
# 소유자: root:lumina  권한: 0640
#

[platform]
# Blossom 플랫폼 식별자
name = blossom
service = lumina
version = 2.0.0

[paths]
# 기본 경로 (각 컴포넌트 설정에서 오버라이드 가능)
base_dir = /opt/blossom/lumina
conf_dir = /etc/blossom/lumina
data_dir = /var/lib/blossom/lumina
log_dir = /var/log/blossom/lumina
run_dir = /run/blossom/lumina

[tls]
# 공통 TLS 설정 — 모든 컴포넌트가 참조
# 실제 인증서 파일을 배치한 후 사용
ca_cert = /etc/blossom/lumina/tls/ca.crt
# 최소 TLS 버전 (1.2 이상 필수)
min_version = TLSv1.2
# 우선 TLS 버전
preferred_version = TLSv1.3
# 약한 cipher 비활성화 (기본값: 강한 cipher만 허용)
ciphers = ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

[security]
# 민감정보 마스킹 활성화 (로그 출력 시)
mask_sensitive_data = true
# 마스킹 대상 패턴 (정규식, 쉼표 구분)
mask_patterns = \b\d{6}-?\d{7}\b,\b[\w.+-]+@[\w-]+\.[\w.]+\b,\b01[0-9]-?\d{3,4}-?\d{4}\b
# 개인정보 수집 최소화 원칙
collect_pii = false
# 오류 로그에 스택트레이스 내 비밀값 포함 금지
sanitize_error_logs = true

[logging]
# 공통 로그 레벨 (DEBUG, INFO, WARNING, ERROR, CRITICAL)
level = INFO
# 로그 포맷
format = %%(asctime)s [%%(name)s] [%%(levelname)s] %%(message)s
# 날짜 포맷
datefmt = %%Y-%%m-%%d %%H:%%M:%%S
# 감사 로그 활성화
audit_enabled = true
audit_dir = /var/log/blossom/lumina/audit

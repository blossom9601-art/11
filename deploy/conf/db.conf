#
# /etc/blossom/lumina/db.conf
# Blossom Lumina — DB 접속 설정
#
# AP 서버(writer)와 WEB 서버(reader)가 공통으로 참조하는 DB 접속 설정.
# 각 서비스는 자신의 역할에 맞는 계정을 사용한다.
#
# ★ 비밀번호는 이 파일에 기록하지 않는다.
#   → secure.env의 환경변수에서 주입
#
# 소유자: root:lumina  권한: 0640
#

[mariadb]
# ── DB 서버 접속 정보 ────────────────────────────────────
host = db.example.com
port = 3306
database = lumina
charset = utf8mb4

# ── TLS 접속 (필수 — 평문 접속 금지) ────────────────────
ssl = true
ssl_ca = /etc/blossom/lumina/tls/ca.crt
# 클라이언트 인증서 (DB 서버가 요구하는 경우)
# ssl_cert = /etc/blossom/lumina/tls/client.crt
# ssl_key = /etc/blossom/lumina/tls/client.key
ssl_verify_server_cert = true

# ── 계정 (비밀번호는 secure.env에서 환경변수로 주입) ──────
# AP 서버 사용 시: LUMINA_DB_AP_USER / LUMINA_DB_AP_PASSWORD
# WEB 서버 사용 시: LUMINA_DB_WEB_USER / LUMINA_DB_WEB_PASSWORD

[ap_writer]
# AP 서버 전용 계정 (INSERT/UPDATE/SELECT/DELETE)
user_env = LUMINA_DB_AP_USER
password_env = LUMINA_DB_AP_PASSWORD
# 기본 사용자명 (환경변수 미설정 시 fallback)
default_user = lumina_ap_writer

[web_reader]
# WEB 서버 전용 계정 (SELECT only)
user_env = LUMINA_DB_WEB_USER
password_env = LUMINA_DB_WEB_PASSWORD
# 기본 사용자명
default_user = lumina_web_reader

[connection_pool]
# ── 연결 풀 설정 (공통 기본값) ───────────────────────────
pool_size = 10
max_overflow = 5
pool_timeout = 30
pool_recycle = 1800
pool_pre_ping = true

[timeouts]
# ── 연결 타임아웃 ────────────────────────────────────────
connect_timeout = 10
read_timeout = 30
write_timeout = 30

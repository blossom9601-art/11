#
# /etc/blossom/lumina/agent.conf
# Blossom Lumina — Agent 설정
#
# 기존 Lumina-agent와 호환되면서 보안 기준에 맞게 표준화된 설정 파일.
# RPM 설치 시 자동 생성, config(noreplace)로 업그레이드 시 보존.
#
# ★ 기존 /etc/lumina/lumina.conf 에서 마이그레이션된 경우,
#   하위 호환을 위해 심볼릭 링크가 유지됩니다.
#
# 소유자: root:lumina  권한: 0640
#

[server]
# ── AP 서버 접속 정보 ────────────────────────────────────
# AP 서버 IP 또는 도메인 (★ 설치 후 반드시 입력)
host =
# AP 서버 수신 포트 (기본값: 5100)
port = 5100
# 통신 프로토콜 (https 필수 — http 사용 금지)
protocol = https
# API 경로
api_path = /api/agent/upload

# ── TLS 설정 (필수) ──────────────────────────────────────
# SSL 인증서 검증 (운영환경에서는 반드시 true)
verify_ssl = true

[tls]
# ── 인증서 경로 ──────────────────────────────────────────
# CA 인증서 (서버 인증서 검증용)
ca_cert = /etc/blossom/lumina/tls/ca.crt
# 클라이언트 인증서 (mTLS 사용 시)
client_cert = /etc/blossom/lumina/tls/client.crt
client_key = /etc/blossom/lumina/tls/client.key

[auth]
# ── 인증 방식 ────────────────────────────────────────────
# mTLS 사용 시에는 별도 토큰 불필요
# mTLS 미사용 시 Bearer 토큰 인증 (파일에서 읽기)
token_file = /etc/blossom/lumina/agent-token
# 토큰 파일 권한: 0600 root:lumina

[agent]
# ── 수집 주기 (초) ───────────────────────────────────────
# 기본값: 3600 (1시간)
interval = 3600

# ── 수집 항목 (쉼표 구분) ────────────────────────────────
# 사용 가능: interface, account, package
collectors = interface, account, package

# ── 데이터 디렉터리 ──────────────────────────────────────
# JSON 출력 디렉터리 (서버 전송 실패 시 fallback 저장)
output_dir = /var/lib/blossom/lumina/agent

# ── 로컬 큐 (전송 실패 시 재시도용) ─────────────────────
queue_dir = /var/lib/blossom/lumina/agent/queue
# 큐 최대 크기 (MB)
queue_max_size_mb = 500

[retry]
# ── 재시도 정책 (지수 백오프) ────────────────────────────
# 최대 재시도 횟수
max_attempts = 5
# 초기 대기 시간 (초)
backoff_base = 30
# 최대 대기 시간 (초)
backoff_max = 3600
# 재시도 간 지터 (임의 지연, 0~1 비율)
backoff_jitter = 0.2

[logging]
# ── 로그 설정 ────────────────────────────────────────────
log_dir = /var/log/blossom/lumina/agent
log_level = INFO
# 로그 파일명
log_file = lumina-agent.log
# 민감정보 마스킹 (로그 출력 시)
mask_sensitive = true

[privacy]
# ── 개인정보 보호 설정 ──────────────────────────────────
# 비밀번호 수집 금지 (절대 false로 변경하지 마세요)
collect_passwords = false
# 사용자 홈 디렉터리 내용 수집 금지
collect_home_contents = false
# 환경변수 수집 금지
collect_env_vars = false
# 민감 파일 경로 스캔 금지
scan_sensitive_paths = false

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 하위 호환 (레거시 설정 지원)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 기존 lumina.conf의 [agent] server_url 필드도 여전히 인식됩니다.
# 예: server_url = https://172.30.1.45:5100/api/agent/upload
# → host/port/protocol/api_path로 자동 분해됩니다.

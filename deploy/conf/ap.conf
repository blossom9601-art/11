#
# /etc/blossom/lumina/ap.conf
# Blossom Lumina — AP 서버 설정
#
# AP 서버는 Agent로부터 데이터를 수신하여 파싱 후 DB에 적재한다.
# RPM 설치 시 자동 생성, config(noreplace)로 업그레이드 시 보존.
#
# 소유자: root:lumina-ap  권한: 0640
#

[receiver]
# ── 수신 바인딩 ──────────────────────────────────────────
# Agent 데이터 수신 포트
bind_address = 0.0.0.0
port = 5100

# ── TLS 설정 (필수 — 평문 수신 금지) ────────────────────
tls_enabled = true
tls_cert = /etc/blossom/lumina/tls/server.crt
tls_key = /etc/blossom/lumina/tls/server.key
tls_ca = /etc/blossom/lumina/tls/ca.crt
tls_min_version = TLSv1.2

# ── mTLS (mutual TLS) 설정 ──────────────────────────────
# Agent 클라이언트 인증서를 검증하여 양방향 인증
mtls_enabled = true
# mTLS를 사용하지 않을 경우 토큰 인증 필수
# mtls_enabled = false

# ── 인증 ─────────────────────────────────────────────────
# mTLS 미사용 시 Bearer 토큰 인증 활성화
token_auth_enabled = true
# 토큰 검증: DB agent_tokens 테이블의 token_hash와 대조

# ── 요청 제한 ────────────────────────────────────────────
# 최대 페이로드 크기 (바이트, 기본 10MB)
max_payload_size = 10485760
# JSON 최대 깊이
max_json_depth = 10
# 스키마 검증 활성화
schema_validation = true

# ── Rate Limit ───────────────────────────────────────────
# IP당 분당 최대 요청 수
rate_limit_per_ip = 60
# 전체 분당 최대 요청 수
rate_limit_global = 600
# Rate limit 초과 시 응답 코드
rate_limit_status = 429

[queue]
# ── 파일 기반 큐 (장애 시 데이터 유실 방지) ──────────────
queue_dir = /var/lib/blossom/lumina/ap/queue
# 큐 최대 크기 (MB)
max_queue_size_mb = 2048
# 큐 파일 최대 보존 시간 (시간)
max_retention_hours = 72
# 동시 처리 워커 수
worker_count = 4

[parser]
# ── 데이터 파싱 ──────────────────────────────────────────
# 입력값 검증 엄격 모드
strict_mode = true
# 알 수 없는 필드 허용 여부
allow_unknown_fields = false
# 민감정보 마스킹 (파싱 단계에서 추가 마스킹)
mask_sensitive = true

[failed]
# ── 실패 데이터 처리 ────────────────────────────────────
# 실패 데이터 격리 디렉터리
failed_dir = /var/lib/blossom/lumina/ap/failed
# 재처리 최대 시도 횟수
max_retry = 3
# 재처리 간격 (초)
retry_interval = 300
# 실패 데이터 보존 기간 (일)
retention_days = 30

[raw]
# ── 원본(raw) 로그 보관 ─────────────────────────────────
# 원본 데이터 보관 활성화
save_raw = true
raw_dir = /var/lib/blossom/lumina/ap/raw
# 원본 보관 기간 (일)
raw_retention_days = 30
# 원본 데이터 압축 (gzip)
compress_raw = true

[database]
# ── DB 연결 (별도 db.conf 참조) ─────────────────────────
# DB 설정은 /etc/blossom/lumina/db.conf 에서 관리
# 비밀번호는 secure.env에서 환경변수로 주입
config_file = /etc/blossom/lumina/db.conf
# 배치 INSERT 크기
batch_size = 500
# DB 연결 풀 크기
pool_size = 10
pool_overflow = 5
# DB 연결 타임아웃 (초)
connect_timeout = 10

[logging]
# ── AP 서버 로그 ─────────────────────────────────────────
log_dir = /var/log/blossom/lumina/ap
log_level = INFO
# 로그 파일별 분리
receiver_log = receiver.log
parser_log = parser.log
worker_log = worker.log

[health]
# ── 헬스체크 ─────────────────────────────────────────────
# 내부 헬스체크 엔드포인트 (모니터링용)
health_bind = 127.0.0.1
health_port = 5101
# /health → 200 OK (DB 연결 + 큐 상태)

#
# /etc/blossom/lumina/web.conf
# Blossom Lumina — WEB 서버 설정 (Flask 앱)
#
# NGINX → Gunicorn → Flask 구조에서 Flask 앱 설정을 관리한다.
# RPM 설치 시 자동 생성, config(noreplace)로 업그레이드 시 보존.
#
# 소유자: root:lumina-web  권한: 0640
#

[flask]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Flask 기본 설정 (운영 모드 — DEBUG 절대 금지)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
debug = false
testing = false
# SECRET_KEY는 secure.env에서 환경변수로 주입 (하드코딩 금지)
# secret_key = (secure.env → LUMINA_SECRET_KEY)
env = production

[session]
# ── 세션 보안 ────────────────────────────────────────────
cookie_secure = true
cookie_httponly = true
cookie_samesite = Lax
cookie_name = lumina_session
# 세션 만료 (초, 기본 8시간)
permanent_session_lifetime = 28800
# 세션 갱신 (활동 시 만료 연장)
session_refresh_each_request = true

[csrf]
# ── CSRF 보호 ────────────────────────────────────────────
enabled = true
# WTF_CSRF_TIME_LIMIT (초)
time_limit = 3600

[gunicorn]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Gunicorn 설정 (별도 gunicorn.conf.py에서도 참조 가능)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 내부 바인딩만 허용 (외부 접근은 NGINX가 처리)
bind = 127.0.0.1:8000
# 워커 수 (CPU 코어 * 2 + 1 권장)
workers = 5
# 워커 타입
worker_class = gthread
# 워커당 스레드 수
threads = 2
# 요청 타임아웃 (초)
timeout = 30
graceful_timeout = 10
keepalive = 5
# 메모리 누수 방지 (워커당 최대 요청 수 후 재시작)
max_requests = 1000
max_requests_jitter = 100
# PID 파일
pidfile = /run/blossom/lumina/gunicorn.pid
# 접근 로그 (NGINX에서 이미 기록하므로 비활성화 가능)
accesslog = /var/log/blossom/lumina/web/gunicorn.log
errorlog = /var/log/blossom/lumina/web/gunicorn-error.log
loglevel = warning
# 프록시 헤더 전달
forwarded_allow_ips = 127.0.0.1
# 서버 헤더 숨김
server_header = false

[database]
# ── DB 연결 (READ-ONLY) ─────────────────────────────────
# DB 설정은 /etc/blossom/lumina/db.conf 에서 관리
# WEB은 lumina_web_reader 계정 사용 (SELECT만 가능)
config_file = /etc/blossom/lumina/db.conf
# DB 연결 풀
pool_size = 5
pool_overflow = 3
pool_recycle = 1800
# 읽기 전용 강제
read_only = true

[security]
# ── 추가 보안 설정 ──────────────────────────────────────
# 관리자 페이지 접근 IP 제한 (쉼표 구분, 빈 값이면 제한 없음)
admin_allowed_ips =
# 로그인 실패 제한 (계정 잠금)
login_max_attempts = 5
login_lockout_seconds = 900
# 비밀번호 최소 길이
password_min_length = 12
# 비밀번호 복잡성 (대문자, 소문자, 숫자, 특수문자 필수)
password_complexity = true

[logging]
# ── WEB 서버 로그 ────────────────────────────────────────
log_dir = /var/log/blossom/lumina/web
log_level = WARNING
access_log = access.log
error_log = error.log

###############################################################################
# lumina.conf — NGINX Reverse Proxy 설정
# Blossom Lumina WEB 서버
# 설치 경로: /etc/nginx/conf.d/lumina.conf
#
# 보안 기본값:
#   - HTTPS only (HTTP → 301 redirect)
#   - HSTS 활성화
#   - TLS 1.2+ (1.3 우선)
#   - 보안 헤더 전체 적용
#   - server_tokens off
#   - request size 제한
#   - rate limit
#   - directory listing 금지
###############################################################################

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Rate Limiting 존 정의
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
limit_req_zone $binary_remote_addr zone=lumina_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=lumina_login:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=lumina_api:10m     rate=60r/s;

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HTTP → HTTPS 리다이렉트 (평문 접속 차단)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    # 모든 HTTP 요청을 HTTPS로 영구 리다이렉트
    return 301 https://$host$request_uri;
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HTTPS 서버 (메인)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  lumina.example.com;  # ★ 실제 도메인으로 변경

    # ── TLS 인증서 ───────────────────────────────────
    ssl_certificate      /etc/blossom/lumina/tls/server.crt;
    ssl_certificate_key  /etc/blossom/lumina/tls/server.key;
    ssl_trusted_certificate /etc/blossom/lumina/tls/ca.crt;

    # ── TLS 프로토콜 및 Cipher ───────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    # ── TLS 세션 캐시 ────────────────────────────────
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  1d;
    ssl_session_tickets  off;

    # ── OCSP Stapling ────────────────────────────────
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 보안 헤더
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "0" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;

    # ── 서버 정보 숨김 ──────────────────────────────
    server_tokens off;

    # ── 요청 제한 ────────────────────────────────────
    client_max_body_size    10m;
    client_body_timeout     30s;
    client_header_timeout   30s;
    send_timeout            30s;
    keepalive_timeout       65s;

    # ── 접근 로그 ────────────────────────────────────
    access_log /var/log/blossom/lumina/web/access.log combined;
    error_log  /var/log/blossom/lumina/web/error.log warn;

    # ── Directory listing 금지 ───────────────────────
    autoindex off;

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 정적 파일 서빙
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    location /static/ {
        alias /opt/blossom/lumina/web/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 로그인 엔드포인트 (별도 rate limit — 브루트포스 방지)
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    location /api/auth/login {
        limit_req zone=lumina_login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;
    }

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # API 엔드포인트
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    location /api/ {
        limit_req zone=lumina_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_read_timeout     60s;
        proxy_send_timeout     30s;
        proxy_buffering        on;
        proxy_buffer_size      4k;
        proxy_buffers          8 8k;
    }

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 관리자 페이지 접근 제한
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    location /admin/ {
        # 관리자 접근은 내부 IP만 허용 (필요 시 수정)
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;

        limit_req zone=lumina_general burst=10 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 기본 프록시 (Flask 앱)
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    location / {
        limit_req zone=lumina_general burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;
    }

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 불필요한 경로 차단
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
}

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff66b3"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd1e6"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="s" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- rounded square background for clarity at tiny sizes -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#g2)"/>

  <!-- blossom flower mark -->
  <g transform="translate(32,32)" filter="url(#s)">
    <!-- 6 petals -->
    <g fill="url(#g1)">
      <path d="M0,-21 C8,-21 12,-13 12,-8 C12,-3 8,0 0,0 C-8,0 -12,-3 -12,-8 C-12,-13 -8,-21 0,-21 Z" transform="rotate(0)"/>
      <path d="M0,-21 C8,-21 12,-13 12,-8 C12,-3 8,0 0,0 C-8,0 -12,-3 -12,-8 C-12,-13 -8,-21 0,-21 Z" transform="rotate(60)"/>
      <path d="M0,-21 C8,-21 12,-13 12,-8 C12,-3 8,0 0,0 C-8,0 -12,-3 -12,-8 C-12,-13 -8,-21 0,-21 Z" transform="rotate(120)"/>
      <path d="M0,-21 C8,-21 12,-13 12,-8 C12,-3 8,0 0,0 C-8,0 -12,-3 -12,-8 C-12,-13 -8,-21 0,-21 Z" transform="rotate(180)"/>
      <path d="M0,-21 C8,-21 12,-13 12,-8 C12,-3 8,0 0,0 C-8,0 -12,-3 -12,-8 C-12,-13 -8,-21 0,-21 Z" transform="rotate(240)"/>
      <path d="M0,-21 C8,-21 12,-13 12,-8 C12,-3 8,0 0,0 C-8,0 -12,-3 -12,-8 C-12,-13 -8,-21 0,-21 Z" transform="rotate(300)"/>
    </g>

    <!-- center -->
    <circle r="6.5" fill="#ffffff"/>
  </g>

  <!-- subtle B monogram -->
  <path d="M20 23 v18 c0 1.5 1.2 2.7 2.7 2.7 h7.2 c4.2 0 7.6-3.4 7.6-7.6 0-2.2-0.9-4.2-2.5-5.6 2-1.3 3.3-3.6 3.3-6.2 0-4-3.2-7.2-7.2-7.2 h-8.4 c-1.5 0-2.7 1.2-2.7 2.7 Z
           M25.4 23 h4.5 c2 0 3.6 1.6 3.6 3.6 0 2-1.6 3.6-3.6 3.6 h-4.5 Z
           M25.4 34.8 h5.2 c2.2 0 4 1.8 4 4 0 2.2-1.8 4-4 4 h-5.2 Z"
        fill="#0f172a" opacity="0.75"/>
</svg>
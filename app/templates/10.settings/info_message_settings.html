<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>blossom - 문구 관리</title>
    <link rel="icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="shortcut icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="apple-touch-icon" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="stylesheet" href="/static/css/blossom.css?v=1.2.4">
    <link rel="stylesheet" href="/static/css/system.css?v=4.32">
    <link rel="stylesheet" href="/static/css/info_message_settings.css?v=1.0.0">
</head>
<body>
    {% include 'layouts/_header.html' %}
    {% include 'layouts/_sidebar.html' %}

    <main class="main-content">
        <div class="content-wrapper">
            <div class="page-header">
                <h1>인포메이션 문구 관리</h1>
                <p>각 페이지에 표시되는 보안/안내 문구를 대분류·중분류 기준으로 관리합니다.</p>
            </div>

            <!-- 필터 영역 -->
            <div class="info-msg-filter-bar">
                <div class="info-msg-filter-group">
                    <label for="filter-main-cat">대분류</label>
                    <select id="filter-main-cat" class="info-msg-select">
                        <option value="">전체</option>
                        <option value="system">시스템</option>
                        <option value="governance">거버넌스</option>
                        <option value="datacenter">데이터센터</option>
                        <option value="cost">비용관리</option>
                        <option value="project">프로젝트</option>
                        <option value="insight">인사이트</option>
                        <option value="category">카테고리</option>
                    </select>
                </div>
                <div class="info-msg-filter-group">
                    <label for="filter-enabled">사용 여부</label>
                    <select id="filter-enabled" class="info-msg-select">
                        <option value="">전체</option>
                        <option value="1">사용</option>
                        <option value="0">미사용</option>
                    </select>
                </div>
                <div class="info-msg-filter-group">
                    <label for="filter-search">검색</label>
                    <input id="filter-search" type="text" class="info-msg-input" placeholder="menu_key, 중분류, 제목 검색">
                </div>
                <button id="btn-filter" class="info-msg-btn info-msg-btn-primary" type="button">조회</button>
                <button id="btn-new" class="info-msg-btn info-msg-btn-success" type="button">+ 신규 등록</button>
            </div>

            <!-- 목록 테이블 -->
            <div class="info-msg-table-wrap">
                <table class="info-msg-table" id="info-msg-table">
                    <thead>
                        <tr>
                            <th style="width:100px">대분류</th>
                            <th style="width:110px">중분류</th>
                            <th style="width:180px">menu_key</th>
                            <th>제목</th>
                            <th style="width:80px">사용</th>
                            <th style="width:140px">최종 수정일</th>
                            <th style="width:100px">최종 수정자</th>
                            <th style="width:80px">편집</th>
                        </tr>
                    </thead>
                    <tbody id="info-msg-tbody">
                        <tr><td colspan="8" class="info-msg-empty">조회 중...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- 편집 모달 -->
            <div id="info-msg-modal" class="info-msg-modal-overlay" hidden>
                <div class="info-msg-modal">
                    <div class="info-msg-modal-header">
                        <h2 id="modal-title">인포메이션 문구 편집</h2>
                        <button id="modal-close" class="info-msg-modal-close" type="button" aria-label="닫기">&times;</button>
                    </div>
                    <div class="info-msg-modal-body">
                        <input type="hidden" id="edit-id">
                        <div class="info-msg-form-row">
                            <label>대분류 코드</label>
                            <input id="edit-main-cat-code" type="text" class="info-msg-input" placeholder="예: system">
                        </div>
                        <div class="info-msg-form-row">
                            <label>대분류 이름</label>
                            <input id="edit-main-cat-name" type="text" class="info-msg-input" placeholder="예: 시스템">
                        </div>
                        <div class="info-msg-form-row">
                            <label>중분류 코드</label>
                            <input id="edit-sub-cat-code" type="text" class="info-msg-input" placeholder="예: server">
                        </div>
                        <div class="info-msg-form-row">
                            <label>중분류 이름</label>
                            <input id="edit-sub-cat-name" type="text" class="info-msg-input" placeholder="예: 서버">
                        </div>
                        <div class="info-msg-form-row">
                            <label>menu_key</label>
                            <input id="edit-menu-key" type="text" class="info-msg-input" placeholder="예: system.server">
                        </div>
                        <div class="info-msg-form-row">
                            <label>제목</label>
                            <input id="edit-title" type="text" class="info-msg-input" placeholder="안내 제목">
                        </div>
                        <div class="info-msg-form-row">
                            <label>내용 (줄바꿈 가능)</label>
                            <textarea id="edit-content" class="info-msg-textarea" rows="6" placeholder="안내 내용을 입력하세요. 줄바꿈(Enter)은 문단 구분에 사용됩니다."></textarea>
                        </div>
                        <div class="info-msg-form-row">
                            <label>사용 여부</label>
                            <label class="info-msg-switch">
                                <input id="edit-enabled" type="checkbox" checked>
                                <span class="info-msg-slider"></span>
                            </label>
                        </div>
                        <div class="info-msg-form-row">
                            <label>정렬순서</label>
                            <input id="edit-sort-order" type="number" class="info-msg-input" value="0" min="0">
                        </div>
                        <!-- 미리보기 -->
                        <div class="info-msg-form-row">
                            <label>미리보기</label>
                            <div id="edit-preview" class="info-msg-preview"></div>
                        </div>
                    </div>
                    <div class="info-msg-modal-footer">
                        <button id="btn-save" class="info-msg-btn info-msg-btn-primary" type="button">저장</button>
                        <button id="btn-cancel" class="info-msg-btn" type="button">취소</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="/static/js/blossom.js?v=20260406_tab"></script>
    <script src="/static/js/blossom-query.js?v=20260320"></script>
    <script src="/static/js/blossom-query-entities.js?v=20260320"></script>
    <script src="/static/js/blossom-query-bridge.js?v=20260320"></script>
    <script src="/static/js/10.settings/info_message_settings.js?v=1.0.0"></script>
</body>
</html>

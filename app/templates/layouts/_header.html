<!-- Chat unread badge polling -->
<script>
(function(){
  var POLL_MS = 5000;
  var btn = document.getElementById('btn-chat');
  if (!btn) return;
  function check(){
    fetch('/api/chat/unread-total', {credentials:'same-origin'})
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d && d.total > 0) btn.classList.add('has-unread');
        else btn.classList.remove('has-unread');
      })
      .catch(function(){});
  }
  check();
  setInterval(check, POLL_MS);
})();
</script>

<!-- Notification unread badge polling -->
<script>
(function(){
  var POLL_MS = 15000;
  var badge = document.getElementById('noti-badge');
  if (!badge) return;
  function check(){
    fetch('/api/notifications/unread-count', {credentials:'same-origin'})
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d && d.success && d.count > 0){
          badge.textContent = d.count > 10 ? '10+' : String(d.count);
          badge.classList.add('show');
        } else {
          badge.classList.remove('show');
          badge.textContent = '';
        }
      })
      .catch(function(){ badge.classList.remove('show'); badge.textContent = ''; });
  }
  check();
  setInterval(check, POLL_MS);
})();
</script>

{% if current_key and current_key.startswith('hw_') %}
<script>
/* Hardware detail: backup sync — posts title/subtitle to Flask session.
   Primary mechanism is ?asset_id= query-param redirect (VPN pattern).
   This fires as fallback for direct-URL access or bookmarked pages. */
(function(){
  var _HW_SUFFIXES = ['_detail','_system','_contract','_hw','_sw','_backup',
    '_if','_account','_authority','_activate','_firewalld',
    '_storage','_task','_vulnerability','_package','_log','_file','_manager',
    '_hardware','_software','_component','_ip_range','_communication',
    '_vpn_policy','_frontbay','_rearbay','_basic','_assign'];
  var key = '{{ current_key }}';
  var baseKey = key;
  for(var i=0;i<_HW_SUFFIXES.length;i++){
    var s = _HW_SUFFIXES[i];
    if(key.length > s.length && key.substr(key.length - s.length) === s){
      baseKey = key.substr(0, key.length - s.length);
      break;
    }
  }
  function doSync(){
    try{
      var t = document.getElementById('page-title') || document.querySelector('.page-header h1');
      var sub = document.getElementById('page-subtitle') || document.querySelector('.page-header p');
      var title = t ? (t.textContent||'').trim() : '';
      var subtitle = sub ? (sub.textContent||'').trim() : '';
      if(!title || title === '-') return false;
      fetch('/api/_hw_session_sync', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'same-origin',
        body:JSON.stringify({base_key:baseKey, title:title, subtitle:subtitle||'-'})
      }).catch(function(){});
      return true;
    }catch(e){ return false; }
  }
  document.addEventListener('DOMContentLoaded', function(){
    /* Try immediately — if server already rendered real title, sync it */
    if(doSync()) return;
    /* Otherwise observe DOM for client JS to populate title */
    var el = document.getElementById('page-title') || document.querySelector('.page-header h1');
    if(!el) return;
    var obs = new MutationObserver(function(){
      if(doSync()){ obs.disconnect(); }
    });
    obs.observe(el, {childList:true, characterData:true, subtree:true});
    setTimeout(function(){ obs.disconnect(); }, 5000);
  });
})();
</script>

<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="google" content="notranslate">
	<title>blossom</title>
	<link rel="icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
	<link rel="stylesheet" href="/static/css/blossom.css?v=1.2.4">
	<link rel="stylesheet" href="/static/css/3.access_control/access_control.css?v=20260501v">
	<script src="/static/js/blossom.js?v=20260412_admintabs1" defer></script>
	<script src="/static/js/3.access_control/3-1.access_control/3-1-1.access/1.access_list.js?v=20260501d" defer></script>
</head>
<body>
	{% include 'layouts/_header.html' %}
	{% include 'layouts/_sidebar.html' %}
	<main class="main-content access-connect-page">
		<div class="content-wrapper">
			<div class="ac-page-header">
				<div>
					<h1>접근제어 접속</h1>
					<p>승인된 자원을 찾고, 한 화면에서 접속까지 바로 실행합니다.</p>
				</div>
			</div>
			<div class="access-connect-layout">
				<section class="access-connect-panel access-connect-list-panel" aria-label="접속 자원 탐색">
					<div class="access-connect-head">
						<div>
							<h2>내 승인 자원 <span id="access-total" class="count-badge access-total-badge" data-count="0" aria-live="polite">0</span></h2>
							<p>자원명, URL, IP로 검색하고 바로 접속합니다.</p>
						</div>
					</div>
					<div class="system-tabs access-category-tabs" role="tablist" aria-label="자원 분류">
						<button type="button" class="system-tab-btn active" role="tab" aria-selected="true" data-category="">전체</button>
						<button type="button" class="system-tab-btn" role="tab" aria-selected="false" data-category="내부 서비스">내부 서비스</button>
						<button type="button" class="system-tab-btn" role="tab" aria-selected="false" data-category="외부 서비스">외부 서비스</button>
						<button type="button" class="system-tab-btn" role="tab" aria-selected="false" data-category="관리 콘솔">관리 콘솔</button>
						<button type="button" class="system-tab-btn" role="tab" aria-selected="false" data-category="기타">기타</button>
					</div>
					<form class="access-filter access-connect-filter" id="access-filter-form">
						<div>
							<label for="access-search-name">검색</label>
							<input id="access-search-name" name="searchName" type="text" placeholder="자원명, URL, IP" autocomplete="off">
						</div>
						<div>
							<label for="access-type-filter">유형</label>
							<select id="access-type-filter" name="resourceType">
								<option value="">전체</option>
								<option value="WEB">WEB</option>
								<option value="SSH">SSH</option>
							</select>
						</div>
						<div>
							<label for="access-status-filter">상태</label>
							<select id="access-status-filter" name="accessStatus">
								<option value="">전체</option>
								<option value="사용 가능">사용 가능</option>
								<option value="만료 예정">만료 예정</option>
								<option value="만료됨">만료됨</option>
							</select>
						</div>
					</form>
					<div class="access-list-wrap">
						<div id="access-state" class="access-empty-state" hidden></div>
						<div id="access-resource-list" class="access-resource-list" role="list" aria-live="polite"></div>
						<div class="access-pagination" id="access-pagination" hidden>
							<span id="access-pagination-info">0개 항목</span>
							<div class="access-pagination-buttons">
								<button type="button" class="action-chip action-muted" id="access-prev">이전</button>
								<button type="button" class="action-chip action-muted" id="access-next">다음</button>
							</div>
						</div>
					</div>
				</section>
				<aside class="access-connect-panel access-action-panel" aria-label="접속 실행 영역">
					<div class="access-connect-head">
						<div>
							<h2>접속 실행</h2>
							<p>선택한 자원의 상세와 접속 정보를 확인합니다.</p>
						</div>
					</div>
					<div class="access-detail-panel" id="access-detail-panel">
						<div class="access-empty-state access-empty-state--compact">
							<strong>접속할 자원을 선택하세요.</strong>
							<span>왼쪽 목록에서 행을 클릭하면 접속 액션과 권한 정보가 표시됩니다.</span>
						</div>
					</div>
				</aside>
			</div>
		</div>
	</main>
</body>
</html>

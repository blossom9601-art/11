<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="google" content="notranslate">
	<title>blossom</title>
	<link rel="icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
	<link rel="stylesheet" href="/static/css/blossom.css?v=1.2.4">
	<link rel="stylesheet" href="/static/vendor/flatpickr/4.6.13/flatpickr.min.css">
	<link rel="stylesheet" href="/static/vendor/flatpickr/4.6.13/themes/airbnb.css">
	<link rel="stylesheet" href="/static/css/3.access_control/access_control.css?v=20260501g">
	<script src="/static/js/blossom.js?v=20260412_admintabs1" defer></script>
	<script src="/static/vendor/flatpickr/4.6.13/flatpickr.min.js" defer></script>
	<script src="/static/vendor/flatpickr/4.6.13/l10n/ko.js" defer></script>
	<script src="/static/js/3.access_control/3-1.access_control/3-1-4.delegation/1.delegation_list.js?v=20260501b" defer></script>
</head>
<body>
	{% include 'layouts/_header.html' %}
	{% include 'layouts/_sidebar.html' %}
	<main class="main-content access-delegation-page">
		<div class="content-wrapper">
			<div class="ac-page-header">
				<div>
					<div class="page-utility-right" data-info-key="access_control.delegation"></div>
					<h1>승인 대무자 관리</h1>
					<p>부재 기간 동안 접근 신청 승인 업무를 처리할 대무자를 지정합니다.</p>
				</div>
				<a class="action-chip action-muted" href="{{ url_for('pages.show', key='access_control_request') }}">신청 현황으로 이동</a>
			</div>

			<div class="delegation-layout">
				<section class="request-card">
					<div class="request-head">
						<div>
							<h2>대무자 지정</h2>
							<p>겹치는 기간에는 하나의 대무자만 지정할 수 있습니다.</p>
						</div>
					</div>
					<form class="delegation-form" id="delegation-form" autocomplete="off">
						<input type="hidden" id="delegation-delegate-id">
						<div class="request-grid-2">
							<div class="request-date-field">
								<label for="delegation-start-date">부재 시작일</label>
								<input id="delegation-start-date" class="request-date-input delegation-date-input" type="text" placeholder="YYYY-MM-DD" autocomplete="off" readonly required>
							</div>
							<div class="request-date-field">
								<label for="delegation-end-date">부재 종료일</label>
								<input id="delegation-end-date" class="request-date-input delegation-date-input" type="text" placeholder="YYYY-MM-DD" autocomplete="off" readonly required>
							</div>
						</div>
						<div class="delegate-search-wrap">
							<label for="delegation-delegate-search">대무자 검색</label>
							<input id="delegation-delegate-search" type="text" placeholder="이름, 사번, 부서, 이메일 검색" autocomplete="off">
							<div class="delegate-search-results" id="delegation-search-results" hidden></div>
						</div>
						<div class="delegation-current" id="delegation-selected">선택된 대무자가 없습니다.</div>
						<div>
							<label for="delegation-reason">부재 사유</label>
							<textarea id="delegation-reason" placeholder="출장, 휴가 등 대무 지정 사유를 입력하세요." required></textarea>
						</div>
						<div class="request-actions">
							<div id="delegation-form-message"></div>
							<button type="submit" class="action-chip action-primary">대무자 지정</button>
						</div>
					</form>
				</section>

				<section class="request-card">
					<div class="request-head">
						<div>
							<h2>대무자 이력</h2>
							<p>현재 활성 지정과 과거 지정 이력을 확인합니다.</p>
						</div>
						<button type="button" class="action-chip action-muted" id="delegation-refresh-btn">새로고침</button>
					</div>
					<div class="delegation-summary">
						<div class="delegation-current" id="delegation-current">현재 활성 대무자 지정이 없습니다.</div>
					</div>
					<div class="request-table-wrap">
						<div class="state-box" id="delegation-table-state">대무자 이력을 불러오는 중입니다.</div>
						<table class="request-table delegation-table" id="delegation-table" hidden>
							<thead>
								<tr>
									<th>대무자</th>
									<th>부재 기간</th>
									<th>사유</th>
									<th>상태</th>
									<th>등록일</th>
								</tr>
							</thead>
							<tbody id="delegation-table-body"></tbody>
						</table>
					</div>
				</section>
			</div>
		</div>
	</main>
</body>
</html>

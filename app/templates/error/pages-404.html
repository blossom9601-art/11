<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
	<title>blossom</title>
	<link rel="icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
	<link rel="stylesheet" href="/static/css/error.css">
	<link rel="stylesheet" href="/static/css/blossom.css?v=1.2.3">
</head>
<body class="error-page error-404">
	<div class="error-wrapper error-404-split">
		<section class="error-left">
			<p class="eyebrow">Error 404</p>
			<h2 class="error-title">찾으시는 페이지를<br>만날 수 없어요</h2>
			<p class="error-desc">요청하신 페이지가 존재하지 않거나 이동되었을 수 있습니다.<br>주소를 다시 확인해 주세요.</p>
			<p class="hint">문제가 계속되면 관리자에게 문의하세요.</p>
		</section>
		<section class="error-right">
			<div class="error-visual-404">
				<div class="error-figure-404" aria-hidden="true">404</div>
				<img class="error-sticker-404" src="/static/image/svg/error/free-sticker-business2.svg" alt="페이지를 찾을 수 없습니다">
			</div>
		</section>
	</div>
</body>
</html>

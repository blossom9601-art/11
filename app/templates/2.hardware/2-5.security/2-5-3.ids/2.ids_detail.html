<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <link rel="icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="shortcut icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="apple-touch-icon" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <title>blossom</title>
    <link rel="stylesheet" href="/static/css/blossom.css?v=1.2.3">
    <link rel="stylesheet" href="/static/css/system.css?v=4.32">
    <link rel="stylesheet" href="/static/css/detail.css?v=4.32">
    <script src="/static/js/_detail/_hardware_detail.js?v=1.1.0"></script>
    <script src="/static/js/2.hardware/2-5.security/2-5-3.ids/2.ids_detail.js?v=1.37"></script>
</head>
<body>
    <!-- 공통 헤더 & 사이드바 인클루드 -->
    {% include 'layouts/_header.html' %}
    {% include 'layouts/_sidebar.html' %}
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- 뒤로가기 버튼 -->
            <a href="{{ url_for('pages.show', key='hw_security_ids') }}" class="back-btn">
                <img src="/static/image/svg/exit.svg" alt="뒤로가기">
                목록으로 돌아가기
            </a>

            <div class="page-header">
                <h1 id="page-title">{{ title or 'IDS' }}</h1>
                <p id="page-subtitle">{{ subtitle or '-' }}</p>
            </div>

            <!-- IDS 상세 탭 네비게이션 -->
            <div class="server-detail-tabs">
                <a href="{{ url_for('pages.show', key='hw_security_ids_detail') }}" class="server-detail-tab-btn {% if current_key == 'hw_security_ids_detail' %}active{% endif %}">기본정보</a>
                <a href="{{ url_for('pages.show', key='hw_security_ids_hw') }}" class="server-detail-tab-btn {% if current_key == 'hw_security_ids_hw' %}active{% endif %}">하드웨어</a>
                <a href="{{ url_for('pages.show', key='hw_security_ids_if') }}" class="server-detail-tab-btn {% if current_key == 'hw_security_ids_if' %}active{% endif %}">인터페이스</a>
                <a href="{{ url_for('pages.show', key='hw_security_ids_account') }}" class="server-detail-tab-btn {% if current_key == 'hw_security_ids_account' %}active{% endif %}">계정관리</a>
                <a href="{{ url_for('pages.show', key='hw_security_ids_task') }}" class="server-detail-tab-btn {% if current_key == 'hw_security_ids_task' %}active{% endif %}">작업이력</a>
                <a href="{{ url_for('pages.show', key='hw_security_ids_vulnerability') }}" class="server-detail-tab-btn {% if current_key == 'hw_security_ids_vulnerability' %}active{% endif %}">취약점</a>
                <a href="{{ url_for('pages.show', key='hw_security_ids_package') }}" class="server-detail-tab-btn {% if current_key == 'hw_security_ids_package' %}active{% endif %}">패키지</a>
                <a href="{{ url_for('pages.show', key='hw_security_ids_log') }}" class="server-detail-tab-btn {% if current_key == 'hw_security_ids_log' %}active{% endif %}">변경이력</a>
                <a href="{{ url_for('pages.show', key='hw_security_ids_file') }}" class="server-detail-tab-btn {% if current_key == 'hw_security_ids_file' %}active{% endif %}">구성/파일</a>
            </div>

            <!-- IDS 상세 탭 컨텐츠 -->
            <div class="server-detail-content">
                <!-- 기본정보 탭 -->
                <div class="server-detail-pane active" id="basic">
                    <button class="add-btn-icon" id="detail-edit-open" title="기본정보 수정" type="button">
                        <img src="/static/image/svg/list/free-icon-pencil.svg" alt="수정">
                    </button>
                    <!-- 기본정보 섹션 -->
                    <div class="detail-section">
                        <h3>기본정보</h3>
                        <div class="basic-info-grid">
                            <!-- 비즈니스 정보 -->
                            <div class="basic-info-card">
                                <div class="basic-info-card-header">
                                    <h4>비즈니스</h4>
                                </div>
                                <div class="basic-info-card-content">
                                    <div class="info-row">
                                        <label>업무 상태</label>
                                        <span class="status-pill">
                                            <span class="status-dot ws-wait" aria-hidden="true"></span>
                                            <span class="status-text">-</span>
                                        </span>
                                    </div>
                                    <div class="info-row">
                                        <label>업무 분류</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>업무 구분</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>업무 운영</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>업무 그룹</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>업무 이름</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 이름</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 IP</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>관리 IP</label>
                                        <span class="info-value">-</span>
                                    </div>
                                </div>
                            </div>

                            <!-- 시스템 정보 -->
                            <div class="basic-info-card">
                                <div class="basic-info-card-header">
                                    <h4>시스템</h4>
                                </div>
                                <div class="basic-info-card-content">
                                    <div class="info-row">
                                        <label>시스템 제조사</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 모델명</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 일련번호</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 가상화</label>
                                        <span class="info-value" data-virtualization="-">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 장소</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 위치</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 슬롯</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 크기</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>RACK 전면/후면</label>
                                        <span class="info-value">-</span>
                                    </div>
                                </div>
                            </div>

                            <!-- 담당자 정보 -->
                            <div class="basic-info-card">
                                <div class="basic-info-card-header">
                                    <h4>담당자</h4>
                                </div>
                                <div class="basic-info-card-content">
                                    <div class="info-row">
                                        <label>시스템 담당부서</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 담당자</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>서비스 담당부서</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>서비스 담당자</label>
                                        <span class="info-value">-</span>
                                    </div>
                                </div>
                            </div>

                            <!-- 점검 정보 -->
                            <div class="basic-info-card">
                                <div class="basic-info-card-header">
                                    <h4>점검</h4>
                                </div>
                                <div class="basic-info-card-content">
                                    <div class="info-row">
                                        <label>기밀성</label>
                                        <span class="cell-num"><span class="num-badge">-</span></span>
                                    </div>
                                    <div class="info-row">
                                        <label>무결성</label>
                                        <span class="cell-num"><span class="num-badge">-</span></span>
                                    </div>
                                    <div class="info-row">
                                        <label>가용성</label>
                                        <span class="cell-num"><span class="num-badge">-</span></span>
                                    </div>
                                    <div class="info-row">
                                        <label>보안 점수</label>
                                        <span class="cell-num"><span class="num-badge">-</span></span>
                                    </div>
                                    <div class="info-row">
                                        <label>시스템 등급</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>핵심/일반</label>
                                        <span class="info-value">-</span>
                                    </div>
                                    <div class="info-row">
                                        <label>DR 구축여부</label>
                                        <span class="cell-ox with-badge"><span class="ox-badge">-</span></span>
                                    </div>
                                    <div class="info-row">
                                        <label>서비스 이중화</label>
                                        <span class="cell-ox with-badge"><span class="ox-badge">-</span></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/static/js/blossom.js"></script>
    <!-- 시스템 수정 모달 (리스트 페이지와 동일한 구조/스타일) -->
    <div id="system-edit-modal" class="system-edit-modal server-edit-modal modal-overlay-full" aria-hidden="true">
        <div class="server-edit-content">
            <div class="server-edit-header">
                <div class="server-edit-title"><h3>시스템 수정</h3><p class="server-edit-subtitle">선택한 시스템 정보를 수정합니다.</p></div>
                <button class="close-btn" type="button" id="system-edit-close" title="닫기"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            </div>
            <div class="server-edit-body">
                <form id="system-edit-form"><!-- 동적 채움 --></form>
            </div>
            <div class="server-edit-actions align-right">
                <div class="action-buttons right"><button type="button" class="btn-primary" id="system-edit-save">저장</button></div>
            </div>
        </div>
    </div>
    <!-- ids_detail.js already loaded in head for early sidebar handling -->
</body>
</html>

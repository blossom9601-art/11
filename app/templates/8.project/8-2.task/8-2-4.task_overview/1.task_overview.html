<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>blossom</title>
    <link rel="icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="shortcut icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="apple-touch-icon" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="stylesheet" href="/static/css/blossom.css?v=1.2.4">
    <link rel="stylesheet" href="/static/css/work.css?v=2.1.5">
</head>
<body>
    <!-- 공통 헤더 & 사이드바 인클루드 -->
    {% include 'layouts/_header.html' %}
    {% include 'layouts/_sidebar.html' %}

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                <div class="page-header">
                    <div class="page-utility-right" data-info-key="project.work_status"></div>
                    <h1>작업 관리</h1>
                    <p>작업을 관리 합니다.</p>
                </div>
                <!-- 시스템 탭 네비게이션 -->
                <div class="system-tabs" role="tablist" aria-label="작업 관리 탭">
                    {% set tabs = [
                        ('task_status', '담당 작업'),
                        ('task_participating', '참여 작업'),
                        ('task_overview', '작업 현황'),
                        ('task_completed', '완료 작업')
                    ] %}
                    {% for key, label in tabs %}
                    <a class="system-tab-btn {{ 'active' if current_key == key else '' }}" role="tab" aria-selected="{{ 'true' if current_key == key else 'false' }}" href="{{ url_for('pages.show', key=key) }}">{{ label }}</a>
                    {% endfor %}
                </div>

                <div class="tab-content single-pane">
                    <div class="tab-pane active" id="system-list-pane">
                        <div class="tab-header">
                            <div class="tab-header-left">
                                <h2>작업 현황 <span class="count-badge" id="system-count">0</span></h2>
                            </div>
                            <div class="tab-header-right">
                                <button class="header-btn" id="task-add-report-btn" title="작업보고서 추가" aria-label="작업보고서 추가" type="button">
                                    <img src="/static/image/svg/free-icon-font-tools.svg" alt="작업추가" class="header-icon">
                                </button>
                            </div>
                        </div>
                        <div class="status-group-container" id="status-groups"></div>
                    </div>
                </div>
            </div>
        </main>

        <script>
            window.TASK_PAGE_MODE = 'other';
            window.CURRENT_USER = window.CURRENT_USER || '홍길동';
        </script>
        <script src="/static/js/blossom.js"></script>
        <script src="/static/js/8.project/8-2.task/8-2-1.my_task/1.my_task.js?v=2.16.0"></script>
        <script src="/static/js/common/info-message-v2.js?v=20260413e"></script>
</body>
</html>

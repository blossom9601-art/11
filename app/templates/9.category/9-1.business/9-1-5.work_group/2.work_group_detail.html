<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <link rel="icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="shortcut icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="apple-touch-icon" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <title>blossom</title>
    <link rel="stylesheet" href="/static/css/blossom.css?v=1.2.4">
    <link rel="stylesheet" href="/static/css/detail-common.css?v=1.0">
    <link rel="stylesheet" href="/static/css/detail7.css?v=1.0">
    <link rel="stylesheet" href="/static/css/category2.css">
    <script src="/static/js/9.category/9-1.business/9-1-5.work_group/2.work_group_detail.js?v=3.11"></script>
</head>
<body data-cat-detail-id="{{ cat_detail_id or '' }}">
    <!-- 공통 헤더 & 사이드바 인클루드 -->
    {% include 'layouts/_header.html' %}
    {% include 'layouts/_sidebar.html' %}
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- 뒤로가기 버튼 -->
            <a href="{{ url_for('pages.show', key='cat_business_group') }}" class="back-btn">
                <img src="/static/image/svg/exit.svg" alt="뒤로가기">목록으로 돌아가기
            </a>

            <div class="page-header" id="wg-page-header">
                <h1 id="page-header-title">{{ title or '업무 그룹' }}</h1>
                <p id="page-header-subtitle">{{ subtitle or '' }}</p>
            </div>

            <!-- 업무 그룹 상세 탭 네비게이션 (unix 패턴) -->
            <div class="server-detail-tabs">
                <a href="{{ url_for('pages.show', key='cat_business_group_detail') }}" class="server-detail-tab-btn{% if current_key == 'cat_business_group_detail' %} active{% endif %}">기본정보</a>
                <a href="{{ url_for('pages.show', key='cat_business_group_manager') }}" class="server-detail-tab-btn{% if current_key == 'cat_business_group_manager' %} active{% endif %}">담당자</a>
                <a href="{{ url_for('pages.show', key='cat_business_group_system') }}" class="server-detail-tab-btn{% if current_key == 'cat_business_group_system' %} active{% endif %}">시스템</a>
                <a href="{{ url_for('pages.show', key='cat_business_group_service') }}" class="server-detail-tab-btn{% if current_key == 'cat_business_group_service' %} active{% endif %}">서비스</a>
                <a href="{{ url_for('pages.show', key='cat_business_group_log') }}" class="server-detail-tab-btn{% if current_key == 'cat_business_group_log' %} active{% endif %}">변경이력</a>
                <a href="{{ url_for('pages.show', key='cat_business_group_file') }}" class="server-detail-tab-btn{% if current_key == 'cat_business_group_file' %} active{% endif %}">구성/파일</a>
            </div>

            <!-- 서버 상세 탭 컨텐츠 -->
            <div class="server-detail-content">
                <!-- 기본정보 탭 -->
                <div class="server-detail-pane active" id="basic">
                    <button class="add-btn-icon" id="detail-edit-open" title="기본정보 수정" type="button">
                        <img src="/static/image/svg/list/free-icon-pencil.svg" alt="수정">
                    </button>
                    <!-- 기본정보 섹션 -->
                    <div class="detail-section">
                        <h3>기본정보</h3>
                        <div class="basic-info-grid">
                            <!-- 업무 그룹 기본 정보 -->
                            <div class="basic-info-card">
                                <div class="basic-info-card-header">
                                    <h4>업무 그룹</h4>
                                </div>
                                <div class="basic-info-card-content">
                                    <div class="info-row"><label>업무 상태</label><span class="info-value" id="mf-work-status">-</span></div>
                                    <div class="info-row"><label>업무 그룹</label><span class="toggle-badge" id="mf-wc-name">-</span></div>
                                    <div class="info-row"><label>업무 코드</label><span class="info-value" id="mf-group-code">-</span></div>
                                    <div class="info-row"><label>담당 부서</label><span class="info-value" id="mf-sys-dept">-</span></div>
                                    <div class="info-row"><label>업무 우선순위</label><span class="info-value" id="mf-work-priority">-</span></div>
                                    <div class="info-row"><label>비고</label><span class="info-value" id="mf-note">-</span></div>
                                </div>
                            </div>

                            <!-- 시스템 통계: HW / SW / Component 비율 -->
                            <div class="basic-info-card">
                                <div class="basic-info-card-header">
                                    <h4>시스템 통계</h4>
                                </div>
                                <div class="basic-info-card-content">
                                    <div class="pie-wrap" style="display:none">
                                        <div class="pie-chart" id="sys-pie" aria-label="시스템 분포 그래프"></div>
                                        <ul class="pie-legend" style="display:none">
                                            <li class="legend-item"><span class="legend-dot" id="sys-dot-hw"></span><span class="legend-host">하드웨어</span><span class="legend-size" id="sys-hw-legend">-</span></li>
                                            <li class="legend-item"><span class="legend-dot" id="sys-dot-sw"></span><span class="legend-host">소프트웨어</span><span class="legend-size" id="sys-sw-legend">-</span></li>
                                        </ul>
                                    </div>
                                    <p id="sys-empty" class="info-desc" style="display:none">-</p>
                                </div>
                            </div>

                            <!-- 서비스 통계 카드 -->
                            <div class="basic-info-card">
                                <div class="basic-info-card-header">
                                    <h4>서비스 통계</h4>
                                </div>
                                <div class="basic-info-card-content">
                                    <div class="pie-wrap" id="svc-stats-wrap" style="display:none;">
                                        <div class="donut-chart" id="svc-donut" aria-label="서비스 영향도 분포">
                                            <div class="donut-center" aria-hidden="true">
                                                <span class="donut-total" id="svc-total" style="font-size:36px;font-weight:800;">0</span>
                                            </div>
                                        </div>
                                        <ul class="pie-legend" id="svc-legend" aria-label="영향도별 개수"></ul>
                                    </div>
                                    <p id="svc-empty" class="info-desc" style="display:none">-</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/static/js/blossom.js"></script>
    <!-- 기본정보 수정 모달 (업무 그룹 리스트와 동일한 구조/스타일) -->
    <div id="system-edit-modal" class="system-edit-modal server-edit-modal modal-overlay-full" aria-hidden="true">
        <div class="server-edit-content">
            <div class="server-edit-header">
                <div class="server-edit-title"><h3>업무 그룹 수정</h3><p class="server-edit-subtitle">선택한 업무 그룹 정보를 수정합니다.</p></div>
                <button class="close-btn" type="button" id="system-edit-close" title="닫기"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            </div>
            <div class="server-edit-body">
                <form id="system-edit-form"><!-- 동적 채움 --></form>
            </div>
            <div class="server-edit-actions align-right">
                <div class="action-buttons right"><button type="button" class="btn-primary" id="system-edit-save">저장</button></div>
            </div>
        </div>
    </div>
</body>
</html>

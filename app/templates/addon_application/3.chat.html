<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <link rel="icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="shortcut icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="apple-touch-icon" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <title>blossom</title>
    <link rel="stylesheet" href="/static/css/blossom.css?v=1.2.3">
    <link rel="stylesheet" href="/static/css/addon_application.css?v=20260222-7">
</head>
<body class="chat-layout">
    <!-- 공통 헤더 & 사이드바 인클루드 -->
    {% include 'layouts/_header.html' %}
    {% include 'layouts/_sidebar.html' %}

    <!-- Main Content -->
    <main class="main-content">
        <section class="chat-page">
            <div class="chat-wrapper">
                <!-- Left: conversations -->
                <aside class="chat-sidebar">
                    <div class="chat-tabs" role="tablist">
                        <button class="chat-tab active" data-filter="all" role="tab" aria-selected="true">대화</button>
                        <button class="chat-tab" data-filter="favorites" role="tab">즐겨찾기</button>
                        <button class="chat-tab" data-filter="colleagues" role="tab">동료</button>
                    </div>
                    <div class="chat-search">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M21 21l-4.2-4.2M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/></svg>
                        <input id="chat-search" type="text" placeholder="사람, 그룹, 메시지 검색..." autocomplete="off" />
                    </div>
                    <ul id="chat-list" class="chat-list" aria-label="대화 목록">
                        <!-- populated by JS -->
                    </ul>
                </aside>

                <!-- Center: thread -->
                <section class="chat-thread">
                    <header class="thread-header">
                        <div class="thread-user">
                            <div id="thread-avatar" class="avatar-group" aria-hidden="true"></div>
                            <div>
                                <div class="name" id="thread-name">Dominic</div>
                                <div class="status"><span class="dot online"></span><span id="thread-status">온라인</span></div>
                            </div>
                        </div>
                        <div class="thread-tools">
                            <button class="icon-btn" id="btn-add-member" title="대화상대 추가" aria-label="대화상대 추가">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 5v14M5 12h14" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </button>
                            <button class="icon-btn star" id="btn-favorite" title="즐겨찾기" aria-label="즐겨찾기" aria-pressed="false">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 3l2.9 5.88 6.5.95-4.7 4.58 1.11 6.49L12 17.77l-5.81 3.13 1.11-6.49-4.7-4.58 6.5-.95L12 3z" stroke="currentColor" stroke-width="2" fill="none"/>
                                </svg>
                            </button>
                            <button class="icon-btn" id="btn-leave" title="나가기" aria-label="나가기">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M10 17l5-5-5-5" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M15 12H3" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
                                    <path d="M21 4v16" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </button>
                            <button class="icon-btn" id="btn-delete" title="삭제" aria-label="삭제">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                    </header>
                    <div class="messages-viewport">
                        <div id="chat-messages" class="messages" aria-live="polite"></div>
                        <div class="messages-scrollbar" id="messages-scrollbar" aria-hidden="true">
                            <span class="thumb"></span>
                        </div>
                    </div>
                    <footer class="thread-input">
                        <div class="input-wrap">
                            <input id="chat-input" type="text" placeholder="메시지를 입력하세요" autocomplete="off" />
                            <div class="input-tools">
                                <button class="icon-btn" id="btn-attach" title="Attach" aria-label="Attach"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 8v7a6 6 0 1 1-12 0V6a4 4 0 1 1 8 0v8a2 2 0 1 1-4 0V8" stroke="#64748b" stroke-width="2" stroke-linecap="round"/></svg></button>
                                <button class="icon-btn" id="btn-emoji" title="Emoji" aria-label="Emoji"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" stroke="#64748b" stroke-width="2"/><path d="M8 15s1.5 2 4 2 4-2 4-2" stroke="#64748b" stroke-width="2" stroke-linecap="round"/><circle cx="9" cy="10" r="1" fill="#64748b"/><circle cx="15" cy="10" r="1" fill="#64748b"/></svg></button>
                            </div>
                            <!-- hidden helpers -->
                            <input id="file-input" type="file" hidden multiple />
                            <div id="emoji-popover" class="emoji-popover" hidden aria-hidden="true"></div>
                            <button id="btn-send" class="send-btn" aria-label="Send">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22 2 11 13" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/><path d="m22 2-7 20-4-9-9-4 20-7Z" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/></svg>
                            </button>
                        </div>
                    </footer>
                    
                </section>

                <!-- Right: profile -->
                <aside class="chat-profile">
                    <div class="profile-card">
                        <div class="profile-top">
                            <div id="profile-avatar" class="profile-avatar" aria-hidden="true"></div>
                            <div class="profile-name" id="profile-name">Dominic</div>
                            <button class="email-btn" id="profile-email-btn">이메일 보내기</button>
                            <div class="last-interacted">최근 상호작용: <span id="profile-last">몇 시간 전</span></div>
                        </div>
                        <div class="profile-info" id="profile-info">
                            <div class="info-row"><span class="label">이메일:</span><span id="profile-email">support@blossom.co.kr</span></div>
                            <div class="info-row"><span class="label">내선전화:</span><span id="profile-ext-phone">010-9595-9594</span></div>
                            <div class="info-row"><span class="label">휴대전화:</span><span id="profile-mobile-phone"></span></div>
                            <div class="info-row"><span class="label">부서:</span><span id="profile-location">IT인프라운영1팀</span></div>
                        </div>
                        <div class="profile-participants" id="profile-members" hidden>
                            <div class="info-row"><span class="label">참여자</span><span></span></div>
                            <ul class="member-list" id="member-list" aria-label="참여자 목록"></ul>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <div id="chat-delete-modal" class="chat-modal" hidden aria-hidden="true">
        <div class="chat-modal__backdrop" id="chat-delete-backdrop" aria-hidden="true"></div>
        <div class="chat-modal__dialog" role="dialog" aria-labelledby="chat-delete-title" aria-modal="true">
            <div class="chat-modal__body">
                <div class="chat-modal__icon" aria-hidden="true">⚠️</div>
                <h3 id="chat-delete-title">채팅 삭제</h3>
                <p id="chat-delete-message">이 대화를 삭제할까요?</p>
            </div>
            <div class="chat-modal__actions">
                <button type="button" class="modal-btn ghost" id="chat-delete-cancel">취소</button>
                <button type="button" class="modal-btn danger" id="chat-delete-confirm">삭제</button>
            </div>
        </div>
    </div>

    <div id="chat-config" hidden
            data-rooms-url="{{ chat_rooms_url or '/api/chat/rooms' }}"
            data-api-root="{{ chat_api_root or '/api/chat' }}"
            data-profile-id="{{ current_user_profile_id or '' }}"
                data-user-name="{{ current_user_name or '' }}"
                data-user-emp-no="{{ current_emp_no or '' }}"
                data-user-dept="{{ current_user_department or current_user_dept or current_dept or '' }}"
                data-directory-url="{{ chat_directory_url or '/api/chat/directory' }}"></div>

    <script src="/static/js/blossom.js"></script>
    <script src="/static/js/addon_application/3.chat.js?{{ chat_js_version or 'v=20260222-12' }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <link rel="icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="shortcut icon" type="image/png" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <link rel="apple-touch-icon" href="/static/image/svg/favicon/free-icon-bold-5090971.svg">
    <title>blossom</title>
    <link rel="stylesheet" href="/static/css/blossom.css?v=1.2.4">
    <link rel="stylesheet" href="/static/css/center.css">
    <link rel="stylesheet" href="/static/css/detail-common.css?v=1.0">
    <link rel="stylesheet" href="/static/css/detail6.css?v=1.1">
    <script src="/static/js/6.datacenter/6-3.rack/6-3-2.rack_list/2.rack_detail.js?v=1.8"></script>
</head>
<body>
    <!-- 공통 헤더 & 사이드바 인클루드 -->
    {% include 'layouts/_header.html' %}
    {% include 'layouts/_sidebar.html' %}

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- 뒤로가기 버튼 -->
            <a href="{{ url_for('pages.show', key='dc_rack_list') }}" class="back-btn">
                <img src="/static/image/svg/exit.svg" alt="뒤로가기">
                목록으로 돌아가기
            </a>

            <div class="page-header">
                <h1 id="page-header-title"></h1>
                <p id="page-header-subtitle"></p>
            </div>

            <!-- RACK 상세 탭 네비게이션 -->
            <div class="server-detail-tabs" data-rack-code="{{ rack_code or '' }}">
                <a href="{{ url_for('pages.show', key='dc_rack_detail_basic') }}" class="server-detail-tab-btn active">기본정보</a>
                <a href="{{ url_for('pages.show', key='dc_rack_detail_log') }}" class="server-detail-tab-btn">변경이력</a>
                <a href="{{ url_for('pages.show', key='dc_rack_detail_file') }}" class="server-detail-tab-btn">구성/파일</a>
            </div>

            <!-- 서버 상세 탭 컨텐츠 -->
            <div class="server-detail-content">
                <!-- 기본정보 탭 -->
                <div class="server-detail-pane active" id="basic">
                    <button class="add-btn-icon" id="detail-edit-open" title="기본정보 수정" type="button">
                        <img src="/static/image/svg/list/free-icon-pencil.svg" alt="수정">
                    </button>
                    <!-- 기본정보 섹션 -->
                    <div class="detail-section">
                        <h3>기본정보</h3>
                        <div class="basic-info-grid">
                            <!-- RACK 기본 정보 -->
                            <div class="basic-info-card">
                                <div class="basic-info-card-header">
                                    <h4>RACK</h4>
                                </div>
                                <div class="basic-info-card-content">
                                    <div class="info-row"><label>업무 상태</label><span class="toggle-badge" id="rk-status"></span></div>
                                    <div class="info-row"><label>업무 이름</label><span class="info-value" id="rk-name"></span></div>
                                    <div class="info-row"><label>시스템 제조사</label><span class="info-value" id="rk-vendor"></span></div>
                                    <div class="info-row"><label>시스템 모델명</label><span class="info-value" id="rk-model"></span></div>
                                    <div class="info-row"><label>시스템 일련번호</label><span class="info-value" id="rk-serial"></span></div>
                                    <div class="info-row"><label>시스템 장소</label><span class="info-value" id="rk-location"></span></div>
                                    <div class="info-row"><label>시스템 위치</label><span class="info-value" id="rk-position"></span></div>
                                    <div class="info-row"><label>시스템 높이</label><span class="info-value" id="rk-height"></span></div>
                                </div>
                            </div>

                            <!-- RACK 전면 -->
                            <div class="basic-info-card">
                                <div class="basic-info-card-header">
                                    <h4>RACK 전면</h4>
                                </div>
                                <div class="basic-info-card-content">
                                    <div id="rack-front" class="rack-surface" aria-label="RACK 전면 구성">
                                        <p class="info-desc">전면 구성 정보가 없습니다.</p>
                                    </div>
                                </div>
                            </div>

                            <!-- RACK 후면 -->
                            <div class="basic-info-card">
                                <div class="basic-info-card-header">
                                    <h4>RACK 후면</h4>
                                </div>
                                <div class="basic-info-card-content">
                                    <div id="rack-rear" class="rack-surface" aria-label="RACK 후면 구성">
                                        <p class="info-desc">후면 구성 정보가 없습니다.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/static/js/blossom.js"></script>

    <!-- RACK 장비 추가 모달 -->
    <div id="rack-add-modal" class="server-add-modal modal-overlay-full" aria-hidden="true">
        <div class="server-add-content">
            <div class="server-add-header">
                <div class="server-add-title">
                    <h3>장비 추가</h3>
                    <p class="server-add-subtitle">전면/후면 장비 위치와 장비 정보를 입력하세요.</p>
                </div>
                <button class="close-btn" type="button" id="rack-add-close" title="닫기">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="server-add-body">
                <div class="form-section">
                    <div class="section-header"><h4>위치 / 정보</h4></div>
                    <div class="form-grid">
                        <div class="form-row">
                            <label for="add-u">장비 위치</label>
                            <select id="add-u" class="form-input"></select>
                        </div>
                        <div class="form-row">
                            <label for="add-size">장비 높이</label>
                            <input id="add-size" class="form-input" type="number" min="1" max="10" value="1" />
                        </div>
                        <div class="form-row">
                            <label for="add-work">장비 이름</label>
                            <input id="add-work" class="form-input" type="text" placeholder="예: DB-Server" />
                        </div>
                        <div class="form-row">
                            <label>색상</label>
                            <div id="add-color-group" class="color-group" style="display:flex; gap:8px; align-items:center;"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="server-add-actions align-right">
                <div class="action-buttons right">
                    <button type="button" class="btn-primary" id="add-device-apply">추가</button>
                </div>
            </div>
        </div>
    </div>

    
    <!-- 시스템 수정 모달 (리스트 페이지와 동일한 구조/스타일) -->
    <div id="system-edit-modal" class="system-edit-modal server-edit-modal modal-overlay-full" aria-hidden="true">
        <div class="server-edit-content">
            <div class="server-edit-header">
                <div class="server-edit-title"><h3>시스템 수정</h3><p class="server-edit-subtitle">선택한 시스템 정보를 수정합니다.</p></div>
                <button class="close-btn" type="button" id="system-edit-close" title="닫기"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            </div>
            <div class="server-edit-body">
                <form id="system-edit-form"><!-- 동적 채움 --></form>
            </div>
            <div class="server-edit-actions align-right">
                <div class="action-buttons right"><button type="button" class="btn-primary" id="system-edit-save">저장</button></div>
            </div>
        </div>
    </div>
    
</body>
</html>
